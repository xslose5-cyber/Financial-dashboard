<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="재무 대시보드">
<title>재무 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #f3f3ed;
  --surface: #ffffff;
  --surface-alt: #f9f9f5;
  --surface-hover: #f5f5f0;
  --border: #e3e3dc;
  --border-light: #ededea;
  --text-1: #111110;
  --text-2: #5c5c56;
  --text-3: #9a9a92;
  --blue: #2563eb;
  --blue-bg: #eff4ff;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --amber: #d97706;
  --amber-bg: #fffbeb;
  --purple: #7c3aed;
  --purple-bg: #f5f3ff;
  --negative: #dc2626;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text-1);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: rgba(0,0,0,0.05);
  overflow-x: hidden;
}
.mono { font-family: 'JetBrains Mono', monospace; }
.app { max-width: 1360px; margin: 0 auto; padding: 24px 20px 80px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 12px;
}
.header-left h1 { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
.header-left .sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.header-actions { display: flex; gap: 6px; align-items: center; }

/* Buttons */
.btn {
  padding: 7px 16px; border-radius: var(--radius-sm); font-size: 12px;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); transition: all 0.12s; font-family: inherit;
  white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;
}
.btn:hover { background: var(--surface-hover); }
.btn-primary { background: var(--text-1); color: #fff; border-color: var(--text-1); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { color: var(--red); }
.btn-icon { padding: 7px 10px; }

/* Tabs */
.tabs {
  display: flex; gap: 3px; background: var(--surface); border-radius: var(--radius);
  padding: 3px; border: 1px solid var(--border); width: fit-content;
}
.tab {
  padding: 6px 16px; border-radius: 7px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: none; background: none;
  color: var(--text-2); transition: all 0.12s; white-space: nowrap;
}
.tab.active { background: var(--text-1); color: #fff; }
.tab:hover:not(.active) { background: var(--surface-alt); color: var(--text-1); }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 11px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px;
}

/* Summary Grid */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.summary-card .label { font-size: 11px; color: var(--text-2); font-weight: 500; margin-bottom: 4px; }
.summary-card .value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.summary-card .sub-info { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* Charts */
.charts-row { display: grid; grid-template-columns: 5fr 2fr; gap: 12px; margin-bottom: 20px; }
.chart-box { position: relative; height: 260px; }

/* Legend */
.legend { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; }
.legend-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
.legend-val { margin-left: auto; font-weight: 600; font-size: 12px; }

/* Balance Table */
.balance-wrap {
  max-height: none; overflow: visible;
}
.balance-scroll-area {
  max-height: 1520px; /* ~40 rows visible */
  overflow-y: auto;
  position: relative;
}
.balance-scroll-area::-webkit-scrollbar { width: 5px; }
.balance-scroll-area::-webkit-scrollbar-track { background: transparent; }
.balance-scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
thead { position: sticky; top: 0; z-index: 3; }
thead th {
  background: var(--surface); padding: 9px 12px; text-align: left;
  font-weight: 700; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.4px; color: var(--text-3);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 1px 0 var(--border);
}
thead th:nth-child(n+2) { text-align: right; }
tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); font-variant-numeric: tabular-nums; }
tbody td:nth-child(n+2) { text-align: right; }
tbody tr { cursor: pointer; transition: background 0.08s; }
tbody tr:hover { background: var(--surface-hover); }
.today-row { background: var(--blue-bg) !important; }
.month-sep td { background: var(--surface-alt); font-weight: 700; font-size: 11px; color: var(--text-2); padding: 7px 12px; }
.month-sep td:first-child { text-align: left; }
.in-val { color: var(--green); font-weight: 500; }
.out-val { color: var(--red); font-weight: 500; }
.bal-val { font-weight: 600; }
.negative-bal { color: var(--red) !important; font-weight: 700; }
.future-row { opacity: 0.55; }
.future-row:hover { opacity: 0.8; }
.future-tag { font-size: 9px; color: var(--purple); background: var(--purple-bg); padding: 1px 5px; border-radius: 3px; font-weight: 600; margin-left: 4px; }
.sat { color: var(--blue); }
.sun { color: var(--red); }

/* Day Detail Panel */
.day-detail {
  display: none; background: var(--surface-alt); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin: 4px 0; padding: 14px;
  animation: slideDown 0.15s ease;
}
.day-detail.active { display: block; }
@keyframes slideDown { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
.day-detail-item {
  display: flex; align-items: center; gap: 10px; padding: 6px 0;
  border-bottom: 1px solid var(--border-light); font-size: 12px;
}
.day-detail-item:last-child { border-bottom: none; }
.dd-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
}
.dd-badge.in { background: var(--green-bg); color: var(--green); }
.dd-badge.out { background: var(--red-bg); color: var(--red); }
.dd-badge.recurring { background: var(--purple-bg); color: var(--purple); }
.dd-project {
  font-size: 9px; padding: 2px 6px; border-radius: 10px;
  background: var(--blue-bg); color: var(--blue); font-weight: 500;
}
.dd-amount { margin-left: auto; font-weight: 600; }
.dd-empty { font-size: 12px; color: var(--text-3); padding: 8px 0; }
.inline-day-detail td { padding: 0 !important; }
.inline-day-detail:hover { background: transparent !important; }

/* Transactions */
.tx-list { display: flex; flex-direction: column; gap: 4px; max-height: 400px; overflow-y: auto; }
.tx-list::-webkit-scrollbar { width: 5px; }
.tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.tx-item {
  display: grid; grid-template-columns: 82px 1fr 70px 110px auto;
  align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: var(--radius-sm); border: 1px solid var(--border-light);
  font-size: 12px; transition: background 0.08s;
}
.tx-item:hover { background: var(--surface-alt); }
.tx-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; }
.tx-item:hover .tx-actions { opacity: 1; }
.tx-act-btn {
  width: 28px; height: 28px; border: none; border-radius: 4px;
  cursor: pointer; font-size: 13px; display: flex; align-items: center;
  justify-content: center; background: transparent; transition: background 0.1s;
  color: var(--text-3);
}
.tx-act-btn:hover { background: var(--surface-hover); color: var(--text-1); }
.tx-act-btn.del:hover { background: var(--red-bg); color: var(--red); }
.tx-date { color: var(--text-2); font-size: 11px; }
.tx-desc { font-weight: 500; }
.tx-project {
  font-size: 9px; padding: 2px 6px; border-radius: 10px;
  background: var(--blue-bg); color: var(--blue); display: inline-block;
  margin-left: 5px; font-weight: 500;
}
.tx-recurring-tag {
  font-size: 9px; padding: 2px 6px; border-radius: 10px;
  background: var(--purple-bg); color: var(--purple); display: inline-block;
  margin-left: 5px; font-weight: 500;
}
.tx-type { font-size: 10px; text-align: center; padding: 3px 7px; border-radius: 4px; font-weight: 600; }
.tx-type.in { background: var(--green-bg); color: var(--green); }
.tx-type.out { background: var(--red-bg); color: var(--red); }
.tx-amount { text-align: right; font-weight: 600; }

/* Settlement */
.settle-status {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; cursor: pointer;
}
.settle-status.pending { background: var(--amber-bg); color: var(--amber); }
.settle-status.completed { background: var(--green-bg); color: var(--green); }
.settle-status.overdue { background: var(--red-bg); color: var(--red); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 100; justify-content: center; align-items: flex-start;
  padding-top: 60px; backdrop-filter: blur(2px); overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: 14px; padding: 24px;
  width: 460px; max-width: 92vw; box-shadow: var(--shadow-lg);
  margin-bottom: 40px;
}
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 11px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 12px; font-family: inherit;
  background: var(--surface); transition: border-color 0.12s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

.checkbox-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  font-size: 12px; color: var(--text-2);
}
.checkbox-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--blue); }

/* Recurring List */
.recurring-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border: 1px solid var(--border-light); border-radius: var(--radius-sm);
  font-size: 12px; margin-bottom: 4px;
}
.recurring-item .ri-day { font-weight: 600; min-width: 60px; }
.recurring-item .ri-desc { flex: 1; font-weight: 500; }
.recurring-item .ri-amount { font-weight: 600; }
.recurring-item .ri-del {
  cursor: pointer; color: var(--text-3); font-size: 14px;
  width: 24px; height: 24px; display: flex; align-items: center;
  justify-content: center; border-radius: 4px; transition: all 0.1s;
}
.recurring-item .ri-del:hover { background: var(--red-bg); color: var(--red); }

/* FAB */
.fab-group { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
.fab {
  width: 48px; height: 48px; border-radius: 50%;
  border: none; cursor: pointer; box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: transform 0.12s;
}
.fab:hover { transform: scale(1.08); }
.fab-main { background: var(--text-1); color: #fff; width: 52px; height: 52px; font-size: 22px; }

/* Settings badge */
.settings-indicator {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-3); padding: 4px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px;
}
.settings-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.sync-status {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--text-3); padding: 3px 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; white-space: nowrap;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; transition: background 0.3s; }
.sync-dot.online { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.offline { background: var(--red); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* Responsive — Tablet */
@media (max-width: 900px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .tx-item { grid-template-columns: 70px 1fr 60px 90px; }
}

/* Responsive — iPhone & Mobile */
@media (max-width: 480px) {
  html { -webkit-text-size-adjust: 100%; }
  body { font-size: 14px; }
  .app { padding: 16px 12px 100px; }

  /* Header stacks vertically */
  .header { flex-direction: column; align-items: flex-start; gap: 10px; padding-bottom: 14px; margin-bottom: 16px; }
  .header-left h1 { font-size: 18px; }
  .header-actions { width: 100%; flex-direction: column; align-items: flex-start; gap: 8px; }
  .settings-indicator { font-size: 10px; padding: 3px 8px; }
  .tabs { width: 100%; }
  .tab { flex: 1; text-align: center; padding: 7px 8px; font-size: 12px; }

  /* Summary 2-col */
  .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .summary-card { padding: 14px; }
  .summary-card .value { font-size: 16px; }
  .summary-card .label { font-size: 10px; }

  /* Charts stack, shorter */
  .charts-row { grid-template-columns: 1fr; gap: 10px; margin-bottom: 14px; }
  .chart-box { height: 200px; }
  .card { padding: 14px; margin-bottom: 10px !important; }
  .card-title { font-size: 10px; margin-bottom: 8px; }

  /* Balance table — horizontal scroll for full data */
  .balance-scroll-area { max-height: 600px; overflow: auto; -webkit-overflow-scrolling: touch; }
  .balance-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 580px; font-size: 11px; }
  thead th { padding: 7px 8px; font-size: 9px; white-space: nowrap; background: var(--surface); }
  tbody td { padding: 7px 8px; white-space: nowrap; }
  .month-sep td { padding: 6px 8px; font-size: 10px; }
  .today-row td:first-child span[style*="font-size:9px"] { font-size: 8px !important; }

  /* Day detail panel */
  .day-detail { padding: 10px; }
  .day-detail-item { flex-wrap: wrap; gap: 6px; font-size: 11px; }
  .dd-amount { margin-left: 0; width: 100%; text-align: right; }

  /* Transactions */
  .tx-list { max-height: 320px; }
  .tx-item {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 4px 8px; padding: 10px;
    position: relative;
  }
  .tx-item .tx-date { font-size: 10px; }
  .tx-item > div:nth-child(2) { grid-column: 1 / -1; order: -1; }
  .tx-item .tx-desc { font-size: 12px; }
  .tx-item .tx-type { font-size: 9px; padding: 2px 6px; justify-self: start; }
  .tx-item .tx-amount { font-size: 13px; justify-self: end; }
  .tx-actions { opacity: 1; position: absolute; top: 6px; right: 6px; }
  .tx-act-btn { width: 26px; height: 26px; font-size: 12px; }

  /* Recurring */
  .recurring-item { flex-wrap: wrap; gap: 6px; padding: 10px; }
  .recurring-item .ri-day { min-width: auto; font-size: 11px; }
  .recurring-item .ri-desc { font-size: 11px; min-width: 60%; }
  .recurring-item .ri-amount { font-size: 12px; }

  /* FAB */
  .fab-group { bottom: 16px; right: 12px; gap: 6px; }
  .fab { width: 44px; height: 44px; font-size: 16px; }
  .fab-main { width: 48px; height: 48px; font-size: 20px; }

  /* Modals — full-width bottom sheet style */
  .modal-overlay { padding-top: 0; align-items: flex-end; }
  .modal {
    width: 100%; max-width: 100vw;
    border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px;
    margin-bottom: 0;
    max-height: 92vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal h2 { font-size: 15px; }
  .form-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-row-3 { grid-template-columns: 1fr; gap: 8px; }
  .form-group input, .form-group select {
    font-size: 16px; /* prevents iOS zoom on focus */
    padding: 10px 12px;
  }
  .btn { padding: 10px 16px; font-size: 13px; }
  .btn-row { gap: 6px; }

  /* Balance year nav */
  .btn-icon { padding: 7px 12px; }

  /* Legend compact */
  .legend-item { font-size: 10px; }
  .legend-val { font-size: 11px; }

  /* Touch-friendly tap targets */
  tbody tr { min-height: 44px; }
  .tab { min-height: 36px; }
}

/* Safe area for notched iPhones */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .fab-group { bottom: calc(16px + env(safe-area-inset-bottom)); }
  .modal { padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
  @media (max-width: 480px) {
    .app { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
  }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>재무 대시보드</h1>
      <div class="sub" id="headerDate"></div>
    </div>
    <div class="header-actions">
      <div class="sync-status" id="syncStatus"><div class="sync-dot syncing"></div>연결 중...</div>
      <div class="settings-indicator" id="capitalIndicator"></div>
      <div class="tabs" id="companyTabs">
        <button class="tab active" data-company="all">전체</button>
        <button class="tab" data-company="personal">개인회사</button>
        <button class="tab" data-company="corp">법인회사</button>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-grid" id="summaryCards"></div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">잔액 추이 (오늘 기준 최근 40일)</div>
      <div class="chart-box"><canvas id="balanceChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">이번달 입출금 비율</div>
      <div class="chart-box" style="height:190px"><canvas id="donutChart"></canvas></div>
      <div class="legend" id="donutLegend"></div>
    </div>
  </div>

  <!-- Daily Balance Table — Full Year -->
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">일일 잔액 명세 — <span id="balanceYear" style="text-transform:none;letter-spacing:0"></span></div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn" onclick="exportBalanceExcel()" title="엑셀 다운로드">📥 잔액 명세</button>
        <button class="btn btn-icon" onclick="changeBalanceYear(-1)" title="이전 연도">◀</button>
        <button class="btn btn-icon" onclick="changeBalanceYear(1)" title="다음 연도">▶</button>
        <button class="btn" onclick="scrollToToday()">오늘로 이동</button>
      </div>
    </div>
    <div class="balance-wrap">
      <div class="balance-scroll-area" id="balanceScrollArea">
        <table>
          <thead><tr>
            <th style="width:110px">날짜</th>
            <th>입금</th><th>출금</th>
            <th>개인 잔액</th><th>법인 잔액</th><th>합계 잔액</th>
          </tr></thead>
          <tbody id="balanceBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════
// FIREBASE INIT
// ═══════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyAi4h9nqghGwO4E5TK72Z21iALoZT56RD4",
  authDomain: "testy-f831c.firebaseapp.com",

  storageBucket: "testy-f831c.firebasestorage.app",
  messagingSenderId: "62395115566",
  appId: "1:62395115566:web:ae15dba467a9e218acd7bf"
});
const db = firebase.firestore();
db.enablePersistence().catch(e => console.log('Offline persistence unavailable:', e.code));

// ═══════════════════════════════════════════
// DATA LAYER — Firestore + local cache
// ═══════════════════════════════════════════
const LOCAL_KEY = 'fin_dash_cache';

const defaultSettings = {
  personalCapital: 50000000,
  corpCapital: 80000000,
  startDate: new Date().getFullYear() + '-01-01',
  currentCompany: 'all',
  txFilter: 'all',
  balanceYear: new Date().getFullYear()
};

let state = { transactions: [], recurring: [], settlements: [], descItems: [], settings: { ...defaultSettings } };

const defaultDescItems = [
  { name: '매출 입금', type: 'in' }, { name: '용역비 수령', type: 'in' },
  { name: '프로젝트 대금', type: 'in' }, { name: '컨설팅 수수료', type: 'in' },
  { name: '광고 수익', type: 'in' }, { name: '투자 수익', type: 'in' },
  { name: '임대 수입', type: 'in' }, { name: '정산금', type: 'in' },
  { name: '대출금 입금', type: 'in' }, { name: '환불금', type: 'in' },
  { name: '사무실 임대료', type: 'out' }, { name: '인건비', type: 'out' },
  { name: '서버 비용', type: 'out' }, { name: '마케팅비', type: 'out' },
  { name: '세금 납부', type: 'out' }, { name: '보험료', type: 'out' },
  { name: '소모품 구입', type: 'out' }, { name: '외주비', type: 'out' },
  { name: '통신비', type: 'out' }, { name: '교통비', type: 'out' },
  { name: '식대/복리후생', type: 'out' }, { name: '접대비', type: 'out' },
  { name: '수수료', type: 'both' }, { name: '기타', type: 'both' }
];
let firestoreReady = false;

function setSyncStatus(status, text) {
  const el = document.getElementById('syncStatus');
  const dot = el.querySelector('.sync-dot');
  dot.className = 'sync-dot ' + status;
  el.lastChild.textContent = text;
}

// Save to Firestore
async function saveToFirestore(collection, id, data) {
  try {
    setSyncStatus('syncing', '동기화 중...');
    await db.collection(collection).doc(id).set(data);
    setSyncStatus('online', '동기화 완료');
  } catch(e) {
    console.error('Firestore save error:', e);
    setSyncStatus('offline', '오프라인');
  }
}

async function deleteFromFirestore(collection, id) {
  try {
    setSyncStatus('syncing', '동기화 중...');
    await db.collection(collection).doc(id).delete();
    setSyncStatus('online', '동기화 완료');
  } catch(e) {
    console.error('Firestore delete error:', e);
    setSyncStatus('offline', '오프라인');
  }
}

// Save settings
function saveSettings_db() {
  saveToFirestore('config', 'settings', state.settings);
}

// Save individual transaction
function saveTx_db(tx) {
  saveToFirestore('transactions', tx.id, tx);
}

function deleteTx_db(id) {
  deleteFromFirestore('transactions', id);
}

function saveRecurring_db(r) {
  saveToFirestore('recurring', r.id, r);
}

function deleteRecurring_db(id) {
  deleteFromFirestore('recurring', id);
}

function saveSettle_db(s) {
  saveToFirestore('settlements', s.id, s);
}

function deleteSettle_db(id) {
  deleteFromFirestore('settlements', id);
}

function saveDescItems_db() {
  saveToFirestore('config', 'descItems', { items: state.descItems });
}

// Local cache for UI settings only
function saveLocalUI() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify({
    currentCompany: state.settings.currentCompany,
    txFilter: state.settings.txFilter,
    balanceYear: state.settings.balanceYear
  }));
}
function loadLocalUI() {
  try {
    const c = JSON.parse(localStorage.getItem(LOCAL_KEY));
    if (c) {
      state.settings.currentCompany = c.currentCompany || 'all';
      state.settings.txFilter = c.txFilter || 'all';
      state.settings.balanceYear = c.balanceYear || new Date().getFullYear();
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
// FIRESTORE REAL-TIME LISTENERS
// ═══════════════════════════════════════════
function startListeners() {
  // Settings listener
  db.collection('config').doc('settings').onSnapshot(doc => {
    if (doc.exists) {
      const d = doc.data();
      state.settings.personalCapital = d.personalCapital ?? defaultSettings.personalCapital;
      state.settings.corpCapital = d.corpCapital ?? defaultSettings.corpCapital;
      state.settings.startDate = d.startDate ?? defaultSettings.startDate;
    }
    loadLocalUI();
    firestoreReady = true;
    setSyncStatus('online', '동기화 완료');
    renderAll();
  }, err => {
    console.error('Settings listener error:', err);
    setSyncStatus('offline', '오프라인');
  });

  // DescItems listener
  db.collection('config').doc('descItems').onSnapshot(doc => {
    if (doc.exists && doc.data().items) {
      state.descItems = doc.data().items;
    } else {
      state.descItems = [...defaultDescItems];
      saveDescItems_db();
    }
    updateDescDatalist();
  }, err => { console.error('Desc listener error:', err); });

  // Transactions listener
  db.collection('transactions').onSnapshot(snap => {
    state.transactions = [];
    snap.forEach(doc => {
      state.transactions.push({ ...doc.data(), id: doc.id });
    });
    if (firestoreReady) renderAll();
  }, err => {
    console.error('Tx listener error:', err);
    setSyncStatus('offline', '오프라인');
  });

  // Recurring listener
  db.collection('recurring').onSnapshot(snap => {
    state.recurring = [];
    snap.forEach(doc => {
      state.recurring.push({ ...doc.data(), id: doc.id });
    });
    if (firestoreReady) renderAll();
  }, err => {
    console.error('Recurring listener error:', err);
    setSyncStatus('offline', '오프라인');
  });

  // Settlements listener
  db.collection('settlements').onSnapshot(snap => {
    state.settlements = [];
    snap.forEach(doc => {
      state.settlements.push({ ...doc.data(), id: doc.id });
    });
    if (firestoreReady) renderAll();
  }, err => {
    console.error('Settlements listener error:', err);
    setSyncStatus('offline', '오프라인');
  });
}

// Generate sample data (only once, first setup)
async function generateSampleData() {
  const check = await db.collection('config').doc('settings').get();
  if (check.exists) return; // already initialized

  const today = new Date();
  const descsIn = ['매출 입금','용역비 수령','프로젝트 대금','컨설팅 수수료','광고 수익','투자 수익','임대 수입','정산금'];
  const descsOut = ['사무실 임대료','인건비','서버 비용','마케팅비','세금 납부','보험료','소모품 구입','외주비','통신비','교통비'];
  const projects = ['','','웹사이트 리뉴얼','모바일 앱 개발','브랜딩 프로젝트','SEO 최적화','SNS 마케팅','ERP 구축',''];

  setSyncStatus('syncing', '초기 데이터 생성 중...');

  // Save settings
  await db.collection('config').doc('settings').set({
    personalCapital: 50000000,
    corpCapital: 80000000,
    startDate: today.getFullYear() + '-01-01'
  });

  // Batch write transactions
  const batch1 = db.batch();
  let count = 0;
  for (let i = 80; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (d.getFullYear() < today.getFullYear()) continue;
    const dateStr = ds(d);
    const dow = d.getDay();
    if (dow === 0) continue;
    const n = dow === 6 ? Math.floor(Math.random()*2) : 1 + Math.floor(Math.random()*3);
    for (let j = 0; j < n; j++) {
      if (count >= 490) break; // Firestore batch limit is 500
      const isIn = Math.random() > 0.45;
      const id = uid();
      batch1.set(db.collection('transactions').doc(id), {
        id, date: dateStr,
        type: isIn ? 'in' : 'out',
        company: Math.random() > 0.5 ? 'personal' : 'corp',
        account: Math.random() > 0.5 ? 'account1' : 'account2',
        amount: isIn ? (Math.floor(Math.random()*50)+5)*100000 : (Math.floor(Math.random()*30)+1)*100000,
        desc: isIn ? pick(descsIn) : pick(descsOut),
        project: pick(projects),
        isRecurring: false
      });
      count++;
    }
  }
  await batch1.commit();

  // Recurring items
  const recs = [

// HELPERS
// ═══════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function ds(d) { return d.toISOString().split('T')[0]; }
function fmt(n) { return new Intl.NumberFormat('ko-KR').format(n); }
function fmtShort(n) {
  const a = Math.abs(n);
  if (a >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (a >= 10000000) return (n/10000000).toFixed(1) + '천만';
  if (a >= 10000) return (n/10000).toFixed(0) + '만';
  return fmt(n);
}
function dayLabel(dateStr) {
  return ['일','월','화','수','목','금','토'][new Date(dateStr).getDay()];
}
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

// ═══════════════════════════════════════════
// COMPUTE BALANCES — Full year, with recurring injection
// ═══════════════════════════════════════════
function buildRecurringForDate(dateStr) {
  const d = new Date(dateStr);
  const dayOfMonth = d.getDate();
  const yearMonth = dateStr.slice(0, 7); // "2026-03"
  const results = [];
  state.recurring.forEach(r => {
    // Check start/end month range
    if (r.startMonth && yearMonth < r.startMonth) return;
    if (r.endMonth && yearMonth > r.endMonth) return;

    const maxDay = daysInMonth(d.getFullYear(), d.getMonth()+1);
    const effectiveDay = r.day > maxDay ? maxDay : r.day;
    if (dayOfMonth === effectiveDay) {
      results.push({
        id: 'rec_' + r.id + '_' + dateStr,
        date: dateStr, type: 'out',
        company: r.company, account: r.account,
        amount: r.amount, desc: r.desc,
        project: r.project || '', isRecurring: true
      });
    }
  });
  return results;
}

function computeYearBalances(year) {
  const startDate = state.settings.startDate;
  let pBal = state.settings.personalCapital;
  let cBal = state.settings.corpCapital;

  const calcStart = new Date(startDate);
  const yearStart = new Date(year, 0, 1);
  const yearEnd = new Date(year, 11, 31);
  const today = new Date();
  today.setHours(0,0,0,0);

  // Always go through Dec 31 of the selected year
  const end = yearEnd;

  const realStart = calcStart < yearStart ? calcStart : yearStart;
  const allTx = state.transactions;

  const result = [];
  let cur = new Date(realStart);

  while (cur <= end) {
    const dateStr = ds(cur);
    const isFuture = cur > today;

    // Manual transactions (past + future if user entered them)
    const dayTx = allTx.filter(t => t.date === dateStr);
    // Recurring always apply (past & future)
    const recTx = buildRecurringForDate(dateStr);
    const combined = [...dayTx, ...recTx];

    let dIn = 0, dOut = 0, pIn = 0, pOut = 0, cIn = 0, cOut = 0;
    combined.forEach(t => {
      if (t.type === 'in') {
        dIn += t.amount;
        if (t.company === 'personal') pIn += t.amount; else cIn += t.amount;
      } else {
        dOut += t.amount;
        if (t.company === 'personal') pOut += t.amount; else cOut += t.amount;
      }
    });
    pBal += pIn - pOut;
    cBal += cIn - cOut;

    if (cur.getFullYear() === year) {
      result.push({
        date: dateStr, dayIn: dIn, dayOut: dOut,
        personalBal: pBal, corpBal: cBal,
        total: pBal + cBal, txCount: combined.length,
        isFuture: isFuture
      });
    }
    cur.setDate(cur.getDate() + 1);
  }
  return result;
}

function getAllTxForDate(dateStr) {
  const manual = state.transactions.filter(t => t.date === dateStr);
  const rec = buildRecurringForDate(dateStr);
  return [...manual, ...rec];
}

function filteredTx() {
  const c = state.settings.currentCompany;
  const all = state.transactions;
  return c === 'all' ? all : all.filter(t => t.company === c);
}

function renderAll() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${dayLabel(ds(now))}요일`;

  document.getElementById('capitalIndicator').innerHTML =
    `<span class="dot"></span> 개인 ${fmtShort(state.settings.personalCapital)} · 법인 ${fmtShort(state.settings.corpCapital)}`;

  const year = state.settings.balanceYear;
  document.getElementById('balanceYear').textContent = year + '년';

  const balances = computeYearBalances(year);
  const latest = balances.length ? balances[balances.length - 1] : { personalBal: state.settings.personalCapital, corpBal: state.settings.corpCapital, total: state.settings.personalCapital + state.settings.corpCapital };

  renderSummary(balances, latest);
  renderCharts(balances);

function renderSummary(balances, latest) {
  const c = state.settings.currentCompany;
  let totalBal = c === 'all' ? latest.total : c === 'personal' ? latest.personalBal : latest.corpBal;

  // Today's balance
  const todayStr = ds(new Date());
  const todayData = balances.find(b => b.date === todayStr);
  let todayPersonal = todayData ? todayData.personalBal : state.settings.personalCapital;
  let todayCorp = todayData ? todayData.corpBal : state.settings.corpCapital;
  let todayTotal = todayPersonal + todayCorp;
  if (c === 'personal') todayTotal = todayPersonal;
  else if (c === 'corp') todayTotal = todayCorp;

  const thisMonth = ds(new Date()).slice(0,7);
  const ft = filteredTx();
  const monthTx = ft.filter(t => t.date.startsWith(thisMonth));
  const now = new Date();
  const maxDay = now.getDate();
  let recIn = 0, recOut = 0;
  for (let d = 1; d <= maxDay; d++) {
    const dateStr = `${thisMonth}-${String(d).padStart(2,'0')}`;
    buildRecurringForDate(dateStr).forEach(r => {
      if (c !== 'all' && r.company !== c) return;
      recOut += r.amount;
    });
  }

  const monthIn = monthTx.filter(t => t.type === 'in').reduce((s,t) => s+t.amount, 0);
  const monthOut = monthTx.filter(t => t.type === 'out').reduce((s,t) => s+t.amount, 0) + recOut;
  const net = monthIn - monthOut;

  const isNeg = todayTotal < 0;

  document.getElementById('summaryCards').innerHTML = `
    <div class="card summary-card">
      <div class="label">오늘 잔액 (${todayStr.slice(5)})</div>
      <div class="value mono ${isNeg ? 'negative-bal' : ''}">${fmt(todayTotal)}</div>
      <div class="sub-info">${c==='all' ? `개인 ${fmtShort(todayPersonal)} · 법인 ${fmtShort(todayCorp)}` : '원'}</div>
    </div>
    <div class="card summary-card">
      <div class="label">이번달 입금</div>
      <div class="value mono" style="color:var(--green)">+${fmt(monthIn)}</div>
      <div class="sub-info">원</div>
    </div>
    <div class="card summary-card">
      <div class="label">이번달 출금</div>
      <div class="value mono" style="color:var(--red)">-${fmt(monthOut)}</div>
      <div class="sub-info">고정지출 포함</div>
    </div>
    <div class="card summary-card">
      <div class="label">이번달 순이익</div>
      <div class="value mono" style="color:${net>=0?'var(--green)':'var(--red)'}">${net>=0?'+':''}${fmt(net)}</div>
      <div class="sub-info">원</div>
    </div>`;
}

    const start = Math.max(0, todayIdx - 39);
    last40 = balances.slice(start, todayIdx + 1);

    last40 = balances.slice(-40);
  }
  const ctx1 = document.getElementById('balanceChart').getContext('2d');
  if (balChart) balChart.destroy();

  const labels = last40.map(d => { const dt = new Date(d.date); return `${dt.getMonth()+1}/${dt.getDate()}`; });
  const datasets = [];
  const c = state.settings.currentCompany;
  if (c === 'all' || c === 'personal') {
    datasets.push({
      label: '개인회사', data: last40.map(d => d.personalBal),
      borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.05)',
      fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 4, borderWidth: 2

  }

    datasets.push({
      label: '법인회사', data: last40.map(d => d.corpBal),

        legend: { display: true, position: 'top', align: 'end',
          labels: { boxWidth: 10, boxHeight: 10, borderRadius: 2, useBorderRadius: true, font: { family: "'Noto Sans KR'", size: 10 }, padding: 14 }
        },

          backgroundColor: '#1a1a1a', titleFont: { family: "'Noto Sans KR'", size: 11 },

        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: "'Noto Sans KR'", size: 9 }, color: '#9a9a92', maxTicksLimit: 10 } },
        y: { grid: { color: '#f0f0ec' }, ticks: { font: { family: "'JetBrains Mono'", size: 9 }, color: '#9a9a92', callback: v => fmtShort(v) }, border: { display: false } }
      }
    }
  });

  // Donut
  const thisMonth = ds(new Date()).slice(0,7);
  const ft = filteredTx();

  const mOut = ft.filter(t => t.date.startsWith(thisMonth) && t.type === 'out').reduce((s,t) => s+t.amount, 0);

function renderBalanceTable(balances) {
  const todayStr = ds(new Date());
  const reversed = [...balances].reverse();
  let html = '';
  let lastMonth = null;

  reversed.forEach(d => {
    const dt = new Date(d.date);
    const monthKey = `${dt.getFullYear()}-${dt.getMonth()+1}`;
    if (monthKey !== lastMonth) {
      const monthTotal = reversed.filter(b => {
        const bd = new Date(b.date);
        return bd.getFullYear() === dt.getFullYear() && bd.getMonth() === dt.getMonth();
      });
      const mIn = monthTotal.reduce((s,b) => s + b.dayIn, 0);
      const mOut = monthTotal.reduce((s,b) => s + b.dayOut, 0);
      html += `<tr class="month-sep"><td colspan="3">${dt.getFullYear()}년 ${dt.getMonth()+1}월</td>
        <td colspan="1" class="in-val mono">+${fmtShort(mIn)}</td>
        <td colspan="1" class="out-val mono">-${fmtShort(mOut)}</td>
        <td colspan="1" class="mono" style="font-weight:700">${fmtShort(mIn - mOut >= 0 ? mIn - mOut : mIn - mOut)}</td></tr>`;
      lastMonth = monthKey;
    }

    const dl = dayLabel(d.date);
    const isToday = d.date === todayStr;
    const isFuture = d.isFuture;
    const isSat = dt.getDay() === 6;
    const isSun = dt.getDay() === 0;
    const dayClass = isSun ? 'sun' : isSat ? 'sat' : '';
    const isNegP = d.personalBal < 0;
    const isNegC = d.corpBal < 0;
    const isNegT = d.total < 0;
    const futureClass = isFuture ? 'future-row' : '';

    html += `<tr class="${isToday ? 'today-row' : ''} ${futureClass}" data-date="${d.date}" onclick="toggleDayDetail('${d.date}')">
      <td><span class="${dayClass}">${d.date.slice(5)} (${dl})</span>${isToday ? ' <span style="font-size:9px;color:var(--blue);font-weight:700">오늘</span>' : ''}${isFuture && d.txCount ? ' <span class="future-tag">예정</span>' : ''}${d.txCount ? ` <span style="font-size:9px;color:var(--text-3)">${d.txCount}건</span>` : ''}</td>
      <td class="in-val mono">${d.dayIn ? '+'+fmt(d.dayIn) : '<span style="color:var(--text-3)">-</span>'}</td>
      <td class="out-val mono">${d.dayOut ? '-'+fmt(d.dayOut) : '<span style="color:var(--text-3)">-</span>'}</td>
      <td class="mono ${isNegP?'negative-bal':''}">${fmt(d.personalBal)}</td>
      <td class="mono ${isNegC?'negative-bal':''}">${fmt(d.corpBal)}</td>
      <td class="bal-val mono ${isNegT?'negative-bal':''}">${fmt(d.total)}</td>
    </tr>`;
  });

  document.getElementById('balanceBody').innerHTML = html;
}

function toggleDayDetail(dateStr) {
  // Remove any existing inline detail
  document.querySelectorAll('.inline-day-detail').forEach(el => el.remove());

  if (selectedDate === dateStr) {
    selectedDate = null;
    // Remove highlight
    document.querySelectorAll('tr[data-date]').forEach(r => r.style.background = '');
    return;
  }
  selectedDate = dateStr;

  // Highlight selected row and remove others
  document.querySelectorAll('tr[data-date]').forEach(r => {
    r.style.background = r.dataset.date === dateStr ? 'var(--amber-bg)' : '';
  });

  const txs = getAllTxForDate(dateStr);
  const dl = dayLabel(dateStr);

  let inner = `<div style="font-size:12px;font-weight:700;margin-bottom:8px">📅 ${dateStr} (${dl}) 거래 내역</div>`;
  if (txs.length === 0) {
    inner += `<div class="dd-empty">거래 내역이 없습니다.</div>`;
  } else {
    txs.forEach(t => {
      const typeClass = t.type === 'in' ? 'in' : 'out';
      const sign = t.type === 'in' ? '+' : '-';
      const color = t.type === 'in' ? 'var(--green)' : 'var(--red)';
      const canEdit = !t.isRecurring && !t.id.startsWith('rec_');
      inner += `<div class="day-detail-item">
        <span class="dd-badge ${typeClass} ${t.isRecurring ? 'recurring' : ''}">${t.type === 'in' ? '입금' : '출금'}${t.isRecurring ? ' (고정)' : ''}</span>
        <span style="font-weight:500">${t.desc}</span>
        ${t.project ? `<span class="dd-project">${t.project}</span>` : ''}
        <span style="font-size:10px;color:var(--text-3)">${t.company === 'personal' ? '개인' : '법인'} · ${t.account === 'account1' ? '계좌1' : '계좌2'}</span>
        <span class="dd-amount mono" style="color:${color}">${sign}${fmt(t.amount)}</span>
        ${canEdit ? `<span style="display:flex;gap:2px;margin-left:4px">
          <button class="tx-act-btn" onclick="event.stopPropagation();openEditTxModal('${t.id}')" title="수정" style="width:24px;height:24px;font-size:12px">✎</button>
          <button class="tx-act-btn del" onclick="event.stopPropagation();deleteTx('${t.id}')" title="삭제" style="width:24px;height:24px;font-size:12px">✕</button>
        </span>` : ''}
      </div>`;
    });
  }

  // Find the clicked row and insert detail row right after it
  const clickedRow = document.querySelector(`tr[data-date="${dateStr}"]`);
  if (clickedRow) {
    const detailRow = document.createElement('tr');
    detailRow.className = 'inline-day-detail';
    detailRow.innerHTML = `<td colspan="6" style="padding:0;border-bottom:1px solid var(--border)">
      <div style="padding:12px 14px;background:var(--surface-alt);border-left:3px solid var(--blue);animation:slideDown 0.15s ease">${inner}</div>
    </td>`;
    clickedRow.after(detailRow);
    // Scroll into view
    detailRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

let settleFilter = 'pending';

function renderSettlements() {
  const todayStr = ds(new Date());
  let list = state.settlements || [];

  // Filter
  if (settleFilter === 'pending') list = list.filter(s => s.status !== 'completed');
  else if (settleFilter === 'completed') list = list.filter(s => s.status === 'completed');

  // Sort: pending by date asc, completed by date desc
  list = list.sort((a,b) => {
    if (settleFilter === 'completed') return b.date.localeCompare(a.date);
    return a.date.localeCompare(b.date);
  });

  const emptyEl = document.getElementById('settleEmpty');
  const summaryEl = document.getElementById('settleSummary');
  emptyEl.style.display = list.length ? 'none' : 'block';

  // Summary for pending
  const pending = (state.settlements || []).filter(s => s.status !== 'completed');
  const pendingIn = pending.filter(s => s.type === 'in').reduce((s,x) => s + x.amount, 0);
  const pendingOut = pending.filter(s => s.type === 'out').reduce((s,x) => s + x.amount, 0);
  if (pending.length > 0) {
    summaryEl.style.display = 'block';
    summaryEl.innerHTML = `<span style="font-weight:600">대기 중 요약:</span>
      <span class="mono in-val" style="margin-left:10px">받을 금액 +${fmt(pendingIn)}</span>
      <span class="mono out-val" style="margin-left:10px">보낼 금액 -${fmt(pendingOut)}</span>
      <span class="mono" style="margin-left:10px;font-weight:700;color:${pendingIn-pendingOut>=0?'var(--green)':'var(--red)'}">순 ${pendingIn-pendingOut>=0?'+':''}${fmt(pendingIn-pendingOut)}</span>`;
  } else {
    summaryEl.style.display = 'none';
  }

  document.getElementById('settleList').innerHTML = list.length ? list.map(s => {
    const isOverdue = s.status !== 'completed' && s.date < todayStr;
    const statusClass = s.status === 'completed' ? 'completed' : isOverdue ? 'overdue' : 'pending';
    const statusText = s.status === 'completed' ? '완료' : isOverdue ? '지연' : '대기';
    const daysLeft = s.status !== 'completed' ? Math.ceil((new Date(s.date) - new Date()) / 86400000) : null;
    const daysText = daysLeft !== null ? (daysLeft === 0 ? '오늘' : daysLeft > 0 ? `D-${daysLeft}` : `${Math.abs(daysLeft)}일 지연`) : '';

    return `<div class="tx-item" style="${s.status==='completed'?'opacity:0.5':''}">
      <div class="tx-date">${s.date.slice(5)} (${dayLabel(s.date)})${daysText ? `<div style="font-size:9px;font-weight:600;color:${isOverdue?'var(--red)':'var(--blue)'};margin-top:1px">${daysText}</div>` : ''}</div>
      <div>
        <span class="tx-desc">${s.desc}</span>
        ${s.project ? `<span class="tx-project">${s.project}</span>` : ''}
        ${s.memo ? `<div style="font-size:10px;color:var(--text-3);margin-top:1px">${s.memo}</div>` : ''}
        <div style="font-size:10px;color:var(--text-3);margin-top:1px">${s.company==='personal'?'개인':'법인'} · ${s.account==='account1'?'계좌1':'계좌2'}</div>
      </div>
      <div>
        <span class="settle-status ${statusClass}" onclick="event.stopPropagation();toggleSettleStatus('${s.id}')" title="클릭하여 상태 변경">${statusText}</span>
      </div>
      <div class="tx-amount mono" style="color:${s.type==='in'?'var(--green)':'var(--red)'}">${s.type==='in'?'+':'-'}${fmt(s.amount)}</div>
      <div class="tx-actions">
        <button class="tx-act-btn" onclick="event.stopPropagation();openEditSettleModal('${s.id}')" title="수정">✎</button>
        <button class="tx-act-btn del" onclick="event.stopPropagation();deleteSettle('${s.id}')" title="삭제">✕</button>
      </div>
    </div>`;
  }).join('') : '';
}

function toggleSettleStatus(id) {
  const s = state.settlements.find(x => x.id === id);
  if (!s) return;
  if (s.status === 'completed') {
    s.status = 'pending';
  } else {
    s.status = 'completed';
    s.completedDate = ds(new Date());
    // Optionally auto-create transaction when completed
    if (confirm('정산 완료 처리합니다. 거래 내역에도 자동 등록할까요?')) {
      const tx = {
        id: uid(), date: ds(new Date()), type: s.type,
        company: s.company, account: s.account,
        amount: s.amount, desc: `[정산] ${s.desc}`,
        project: s.project || '', isRecurring: false
      };
      state.transactions.push(tx);
      saveTx_db(tx);
    }
  }
  saveSettle_db(s);
  renderAll();
}

  if (!confirm('정말로 전체 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  setSyncStatus('syncing', '초기화 중...');
  // Delete all documents
  const collections = ['transactions', 'recurring', 'settlements', 'config'];
  for (const col of collections) {
    const snap = await db.collection(col).get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
  }
  state = { transactions: [], recurring: [], settlements: [], descItems: [...defaultDescItems], settings: { ...defaultSettings } };
  localStorage.removeItem(LOCAL_KEY);
  selectedDate = null;
  setSyncStatus('online', '초기화 완료');
  closeModal('settingsModalOverlay'); renderAll();
}

function exportBalanceExcel() {
  const year = state.settings.balanceYear;
  const balances = computeYearBalances(year);

  const rows = balances.map(d => ({
    '날짜': d.date,
    '요일': dayLabel(d.date),
    '입금': d.dayIn || '',
    '출금': d.dayOut || '',
    '개인회사 잔액': d.personalBal,
    '법인회사 잔액': d.corpBal,
    '합계 잔액': d.total,
    '거래건수': d.txCount || 0,
    '구분': d.isFuture ? '예정' : '확정'
  }));

  const ws = XLSX.utils.json_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    { wch: 12 }, { wch: 4 }, { wch: 14 }, { wch: 14 },
    { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 8 }, { wch: 6 }
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${year}년 일일잔액`);

  // Add monthly summary sheet
  const months = {};
  balances.forEach(d => {
    const m = d.date.slice(0, 7);
    if (!months[m]) months[m] = { month: m, totalIn: 0, totalOut: 0, lastBal: 0 };
    months[m].totalIn += d.dayIn;
    months[m].totalOut += d.dayOut;
    months[m].lastBal = d.total;
  });
  const monthRows = Object.values(months).map(m => ({
    '월': m.month,
    '총 입금': m.totalIn,
    '총 출금': m.totalOut,
    '순이익': m.totalIn - m.totalOut,
    '월말 잔액': m.lastBal
  }));
  const ws2 = XLSX.utils.json_to_sheet(monthRows);
  ws2['!cols'] = [{ wch: 10 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 16 }];
  XLSX.utils.book_append_sheet(wb, ws2, `${year}년 월별요약`);

  XLSX.writeFile(wb, `잔액명세_${year}년.xlsx`);
}

      { wch: 8 }, { wch: 14 }, { wch: 24 }, { wch: 16 }
    ];
    XLSX.utils.book_append_sheet(wb, ws2, '고정지출항목');
  }

  const today = ds(new Date());
  const filterLabel = f === 'all' ? '전체' : f === 'in' ? '입금' : '출금';
  const companyLabel = state.settings.currentCompany === 'all' ? '전체' :
    state.settings.currentCompany === 'personal' ? '개인' : '법인';
  XLSX.writeFile(wb, `거래내역_${companyLabel}_${filterLabel}_${today}.xlsx`);
}

function importTxExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = ''; // reset for re-upload

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);

      if (rows.length === 0) { alert('파일에 데이터가 없습니다.'); return; }

      // Auto-detect column mapping
      const sample = rows[0];
      const keys = Object.keys(sample);

      // Try to find columns by known names
      const findCol = (candidates) => keys.find(k => candidates.some(c => k.includes(c))) || null;
      const dateCol = findCol(['날짜', 'date', 'Date', '일자', '거래일']);
      const typeCol = findCol(['유형', 'type', 'Type', '구분', '입출금']);
      const companyCol = findCol(['회사', 'company', 'Company']);
      const accountCol = findCol(['계좌', 'account', 'Account']);
      const amountCol = findCol(['금액', 'amount', 'Amount', '거래금액']);
      const descCol = findCol(['적요', 'desc', '내용', '거래내용', '메모', '비고', '적요내용']);
      const projectCol = findCol(['프로젝트', 'project', 'Project']);

      if (!dateCol || !amountCol) {
        alert(`필수 열을 찾을 수 없습니다.\n\n파일에 최소한 '날짜'와 '금액' 열이 필요합니다.\n\n감지된 열: ${keys.join(', ')}\n\n엑셀 양식: 날짜, 유형(입금/출금), 회사(개인회사/법인회사), 계좌(계좌 1/계좌 2), 금액, 적요, 프로젝트`);
        return;
      }

      const newTxs = [];
      let skipped = 0;

      rows.forEach(row => {
        const rawDate = row[dateCol];
        let date = '';
        if (typeof rawDate === 'number') {
          // Excel serial date
          const d = new Date((rawDate - 25569) * 86400000);
          date = ds(d);
        } else if (typeof rawDate === 'string') {
          // Try parsing various formats
          const cleaned = rawDate.replace(/\./g, '-').replace(/\//g, '-').trim();
          const parsed = new Date(cleaned);
          if (!isNaN(parsed)) date = ds(parsed);
        }
        if (!date) { skipped++; return; }

        const rawAmount = row[amountCol];
        const amount = Math.abs(typeof rawAmount === 'number' ? rawAmount : parseInt(String(rawAmount).replace(/[^\d-]/g, '')) || 0);
        if (!amount) { skipped++; return; }

        // Detect type
        let type = 'out';
        if (typeCol && row[typeCol]) {
          const tv = String(row[typeCol]).trim();
          if (tv.includes('입금') || tv.includes('in') || tv === '입') type = 'in';
        } else if (typeof rawAmount === 'number' && rawAmount > 0) {
          type = 'in';
        }

        // Detect company
        let company = 'personal';
        if (companyCol && row[companyCol]) {
          const cv = String(row[companyCol]).trim();
          if (cv.includes('법인') || cv.includes('corp')) company = 'corp';
        }

        // Detect account
        let account = 'account1';
        if (accountCol && row[accountCol]) {
          const av = String(row[accountCol]).trim();
          if (av.includes('2')) account = 'account2';
        }

        const desc = descCol && row[descCol] ? String(row[descCol]).trim() : '엑셀 업로드';
        const project = projectCol && row[projectCol] ? String(row[projectCol]).trim() : '';

        newTxs.push({
          id: uid(), date, type, company, account, amount, desc, project, isRecurring: false
        });
      });

      if (newTxs.length === 0) {
        alert('가져올 수 있는 거래가 없습니다.');
        return;
      }

      const msg = `${newTxs.length}건의 거래를 가져옵니다.${skipped ? ` (${skipped}건 건너뜀)` : ''}\n\n계속하시겠습니까?`;
      if (!confirm(msg)) return;

      // Save to Firebase in batches
      setSyncStatus('syncing', '업로드 중...');
      const batchSize = 450;
      const batches = [];
      for (let i = 0; i < newTxs.length; i += batchSize) {
        batches.push(newTxs.slice(i, i + batchSize));
      }

      (async () => {
        for (const chunk of batches) {
          const batch = db.batch();
          chunk.forEach(tx => {
            batch.set(db.collection('transactions').doc(tx.id), tx);
          });
          await batch.commit();
        }
        setSyncStatus('online', `${newTxs.length}건 업로드 완료`);
        alert(`${newTxs.length}건의 거래를 성공적으로 가져왔습니다.`);
      })();

    } catch(err) {
      console.error('Import error:', err);
      alert('파일을 읽는 중 오류가 발생했습니다.\n\n지원 형식: .xlsx, .xls, .csv');
    }
  };
  reader.readAsArrayBuffer(file);
}
